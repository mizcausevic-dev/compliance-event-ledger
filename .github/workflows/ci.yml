name: CI

on:
  push:
    branches:
      - main
      - project/**
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v5
        with:
          distribution: microsoft
          java-version: 21
          cache: maven
      - name: Test
        run: ./mvnw test
      - name: Package
        run: ./mvnw package -DskipTests
